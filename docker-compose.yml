services:
  mouse-annotator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mouse-annotation-tool
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
